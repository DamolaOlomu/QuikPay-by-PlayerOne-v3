services:
  - type: web
    name: quickpay-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false  # you'll paste this manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0