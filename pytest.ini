[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
